document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n    { en: 'How long have you already considered opening a company abroad?', pron: 'jáu long jav yu ol-rédi kon-sí-derd óu-pe-ning a kám-pa-ni a-bród?', es: '¿Hace cuánto tiempo viene considerando abrir una empresa en el extranjero?' },\n    { en: 'Have you already one?', pron: 'jav yu ol-rédi uán?', es: '¿Ya tiene una?' }\n  ]},\n  { label: '2', title: 'El negocio', sentences: [\n    { en: 'What business are you in?', pron: 'uát bís-nes ar yu in?', es: '¿A qué negocio se dedica?' }\n  ]},\n  { label: '3', title: 'Nacionalidad y residencia', sentences: [\n    { en: 'Which nationality do you have?', pron: 'uích na-sho-ná-li-ti du yu jav?', es: '¿Qué nacionalidad tiene?' },\n    { en: 'And which residency?', pron: 'and uích ré-si-den-si?', es: '¿Y qué residencia?' }\n  ]},\n  { label: '4', title: 'Rentabilidad', sentences: [\n    { en: 'It looks your business is profitable.', pron: 'it luks yor bís-nes is pró-fi-ta-bol.', es: 'Parece que su negocio es rentable.' },\n    { en: 'If transferable profits are at least 100,000 Euro per year, then tax savings are many times higher than any costs.', pron: 'if trans-fé-ra-bol pró-fits ar at líst uán jándred záusand yúro per yíer, den taks séi-vings ar méni táims jái-er dan éni costs.', es: 'Si las ganancias transferibles son de al menos 100.000 euros al año, el ahorro en impuestos es muchas veces mayor que cualquier costo.' },\n    { en: 'How do you expect it will go this year?', pron: 'jáu du yu eks-pékt it uil góu dis yíer?', es: '¿Cómo espera que le vaya este año?' }\n  ]},\n  { label: '4B', title: 'Si no califica', sentences: [\n    { en: 'It seems this is too early now;', pron: 'it síms dis is tu érli náu;', es: 'Parece que todavía es muy pronto;' },\n    { en: 'let me contact you in a few months to see how the situation is then, so we are available for you when you benefit.', pron: 'let mi kóntakt yu in a fiú monzs tu si jáu de si-chu-éi-shon is den, so uí ar a-véi-la-bol for yu uén yu béne-fit.', es: 'permítame contactarlo en unos meses para ver cómo está la situación entonces, y así estar disponibles para usted cuando le convenga.' }\n  ]},\n  { label: '5', title: 'Impuestos hasta ahora', sentences: [\n    { en: 'Having profits, what did you do until now to help lowering the tax burden?', pron: 'jáving prófits, uát did yu du antíl náu tu jelp ló-ue-ring de taks bérden?', es: 'Teniendo ganancias, ¿qué ha hecho hasta ahora para reducir la carga fiscal?' },\n    { en: 'What was the reason not to act earlier?', pron: 'uát uós de ríson not tu akt érli-er?', es: '¿Cuál fue la razón para no actuar antes?' },\n    { en: 'What did your tax advisor recommend?', pron: 'uát did yor taks ad-vái-sor re-ko-ménd?', es: '¿Qué le recomendó su asesor fiscal?' }\n  ]},\n  { label: '6', title: 'Transición a la venta', sentences: [\n    { en: 'Based on what you told me, there are certainly good solutions.', pron: 'béisd on uát yu tóuld mi, der ar sértenli gud so-lú-shons.', es: 'Según lo que me ha contado, sin duda hay buenas soluciones.' },\n    { en: 'As I told you, the reason for this call was to clarify if we can help you.', pron: 'as ái tóuld yu, de ríson for dis col uós tu klárifai if uí kan jelp yu.', es: 'Como le dije, el motivo de esta llamada era aclarar si podemos ayudarle.' },\n    { en: 'This is the case.', pron: 'dis is de kéis.', es: 'Y así es.' }\n  ]},\n  { label: '7', title: 'La cita', sentences: [\n    { en: 'So let me arrange an appointment with our owner.', pron: 'so let mi a-réinch an a-póint-ment uiz áur óuner.', es: 'Entonces permítame agendar una cita con nuestro dueño.' },\n    { en: 'He is an experienced businessman and tax expert.', pron: 'ji is an eks-pí-riensd bísnes-man and taks ékspert.', es: 'Es un empresario con experiencia y experto en impuestos.' },\n    { en: 'He will discuss your situation and recommend not only a solution but also the steps of how to get there.', pron: 'ji uil diskás yor si-chu-éi-shon and re-ko-ménd not óunli a so-lú-shon bat ólso de steps of jáu tu guet der.', es: 'Analizará su situación y le recomendará no solo una solución, sino también los pasos para llegar a ella.' },\n    { en: 'And if you can benefit only half as much as most of our clients, you will be very surprised.', pron: 'and if yu kan bénefit óunli jaf as mach as móust of áur klái-ents, yu uil bi véri sor-práisd.', es: 'Y si usted se beneficia aunque sea la mitad de lo que se benefician la mayoría de nuestros clientes, quedará muy sorprendido.' }\n  ]},\n  { label: '8', title: 'Calendario y WhatsApp', sentences: [\n    { en: 'Let me look at the calendar, I can book an appointment on Monday or Tuesday.', pron: 'let mi luk at de kálendar, ái kan buk an a-póintment on mándei or tiúsdei.', es: 'Déjeme ver el calendario, puedo agendar una cita el lunes o el martes.' },\n    { en: 'I confirm on WhatsApp.', pron: 'ái kon-férm on uáts-ap.', es: 'Se lo confirmo por WhatsApp.' },\n    { en: 'Mr. Schwarz will contact you on WhatsApp, too, because almost everyone uses it, the phone is always available and it allows to exchange messages.', pron: 'míster shuárts uil kóntakt yu on uáts-ap tu, bikós ólmoust évri-uan yúses it, de fóun is ólueis a-véi-la-bol and it aláus tu eks-chéinch méseyes.', es: 'El señor Schwarz también lo contactará por WhatsApp, porque casi todo el mundo lo usa, el teléfono siempre está disponible y permite intercambiar mensajes.' }\n  ]},\n  { label: '9', title: 'Favor personal (cierre)', sentences: [\n    { en: 'Please do me one more personal favor: if you happen to miss your appointment at short notice, please text me at this number.', pron: 'plis du mi uán mor pérsonal féivor: if yu jápen tu mis yor a-póintment at short nóutis, plis tekst mi at dis námber.', es: 'Por favor, hágame un favor personal más: si llega a perder su cita a última hora, escríbame a este número.' },\n    { en: \"If an appointment is missed, I need to justify, because I have blocked the time and I'm personally responsible for only referring to reliable people.\", pron: 'if an a-póintment is misd, ái nid tu yástifai, bikós ái jav blokd de táim and áim pérsonali res-pónsibol for óunli reféring tu re-lái-a-bol pípol.', es: 'Si se pierde una cita, tengo que justificarlo, porque he bloqueado ese tiempo y soy personalmente responsable de referir solo a personas confiables.' }\n  ]}\n];\nconst INK = '#143644', ORANGE = '#17A8C4', GREEN = '#0FA089', HILITE = '#4FD4E8';\n\nclass Component extends DCLogic {\n  state = { part: 0, sent: 0, word: -1, playing: false, loop: false, rate: 1, showPron: true, showEs: true, playAll: false, voiceURI: '', pop: null, fluid: false, reads: 0, pulse: false, testMode: false, testRunning: false, testMs: 0, recording: false, attempts: [] };\n  _token = 0;\n\n  _db() {\n    if (this._dbP) return this._dbP;\n    this._dbP = new Promise((res, rej) => {\n      const rq = indexedDB.open('karaoke-tests', 1);\n      rq.onupgradeneeded = () => rq.result.createObjectStore('attempts', { keyPath: 'id', autoIncrement: true });\n      rq.onsuccess = () => res(rq.result);\n      rq.onerror = () => rej(rq.error);\n    });\n    return this._dbP;\n  }\n  _loadAttempts() {\n    this._db().then(db => {\n      const rq = db.transaction('attempts').objectStore('attempts').getAll();\n      rq.onsuccess = () => {\n        const attempts = rq.result.map((r, i) => ({\n          id: r.id, ms: r.ms, n: i + 1, date: r.date,\n          url: r.blob ? URL.createObjectURL(r.blob) : null\n        }));\n        this.setState({ attempts });\n      };\n    }).catch(() => {});\n  }\n  _saveAttempt(ms, blob) {\n    this._db().then(db => {\n      const rq = db.transaction('attempts', 'readwrite').objectStore('attempts').add({ ms, blob, date: new Date().toLocaleDateString('es') });\n      rq.onsuccess = () => this.setState(s => ({\n        attempts: s.attempts.map((a, i) => i === s.attempts.length - 1 && a.id == null ? { ...a, id: rq.result } : a)\n      }));\n    }).catch(() => {});\n  }\n  _deleteAttempt(idx) {\n    if (this._audio) { this._audio.pause(); this._audio = null; }\n    const a = this.state.attempts[idx];\n    if (a && a.id != null) this._db().then(db => {\n      db.transaction('attempts', 'readwrite').objectStore('attempts').delete(a.id);\n    }).catch(() => {});\n    this.setState(s => ({\n      playingAtt: null,\n      attempts: s.attempts.filter((_, i) => i !== idx).map((x, i) => ({ ...x, n: i + 1 }))\n    }));\n  }\n  componentDidMount() {\n    this._loadAttempts();\n    if ('speechSynthesis' in window) {\n      speechSynthesis.getVoices();\n      speechSynthesis.onvoiceschanged = () => this.forceUpdate();\n    }\n    this._key = (e) => {\n      const t = (e.target.tagName || '').toUpperCase();\n      if (t === 'SELECT' || t === 'INPUT' || t === 'TEXTAREA' || this.state.testMode) return;\n      if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); this._countRead(); }\n      else if (e.code === 'Delete' || e.code === 'Backspace') { e.preventDefault(); this._uncountRead(); }\n    };\n    window.addEventListener('keydown', this._key);\n  }\n  componentWillUnmount() { this._stop(); window.removeEventListener('keydown', this._key); }\n  _countRead() {\n    clearTimeout(this._pulseT);\n    const n = this.state.reads + 1;\n    if (n >= 10) {\n      this.setState({ reads: 10, pulse: true });\n      this._pulseT = setTimeout(() => {\n        this.setState({ pulse: false });\n        if (this.state.part + 1 < SCRIPT.length) this.goPart(this.state.part + 1);\n        else this.setState({ reads: 0, testMode: true });\n      }, 800);\n    } else {\n      this.setState({ reads: n, pulse: true });\n      this._pulseT = setTimeout(() => this.setState({ pulse: false }), 180);\n    }\n  }\n  _uncountRead() { this.setState({ reads: Math.max(0, this.state.reads - 1) }); }\n  _fmt(ms) {\n    const s = Math.floor(ms / 1000);\n    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0') + '.' + Math.floor((ms % 1000) / 100);\n  }\n  _startTest() {\n    this._stop();\n    this._t0 = Date.now();\n    clearInterval(this._ti);\n    this._ti = setInterval(() => this.setState({ testMs: Date.now() - this._t0 }), 100);\n    this.setState({ testRunning: true, testMs: 0, playing: false });\n    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {\n      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {\n        if (!this.state.testRunning) { stream.getTracks().forEach(t => t.stop()); return; }\n        this._stream = stream; this._chunks = [];\n        this._rec = new MediaRecorder(stream);\n        this._rec.ondataavailable = e => this._chunks.push(e.data);\n        this._rec.start();\n        this.setState({ recording: true });\n      }).catch(() => this.setState({ recording: false, micBlocked: true }));\n    }\n  }\n  _endTest() {\n    clearInterval(this._ti);\n    const ms = Date.now() - this._t0;\n    const finish = (blob) => {\n      this._saveAttempt(ms, blob || null);\n      this.setState(s => ({\n        testRunning: false, recording: false, testMs: ms,\n        attempts: [...s.attempts, { ms, url: blob ? URL.createObjectURL(blob) : null, n: s.attempts.length + 1, date: new Date().toLocaleDateString('es') }]\n      }));\n    };\n    if (this._rec && this._rec.state !== 'inactive') {\n      this._rec.onstop = () => {\n        const blob = new Blob(this._chunks, { type: this._rec.mimeType || 'audio/webm' });\n        if (this._stream) this._stream.getTracks().forEach(t => t.stop());\n        finish(blob);\n      };\n      this._rec.stop();\n    } else finish(null);\n  }\n  _playAttempt(idx) {\n    if (this._audio) { this._audio.pause(); this._audio = null; }\n    if (this.state.playingAtt === idx) { this.setState({ playingAtt: null }); return; }\n    const a = this.state.attempts[idx];\n    if (!a || !a.url) return;\n    this._audio = new Audio(a.url);\n    this._audio.onended = () => this.setState({ playingAtt: null });\n    this._audio.play();\n    this.setState({ playingAtt: idx });\n  }\n  _exitTest() {\n    if (this.state.testRunning) this._endTest();\n    this.setState({ testMode: false });\n  }\n\n  _stop() {\n    this._token++;\n    clearTimeout(this._fbT); clearTimeout(this._wT);\n    try { speechSynthesis.cancel(); } catch (e) {}\n  }\n  _enVoices() {\n    if (!('speechSynthesis' in window)) return [];\n    return speechSynthesis.getVoices().filter(v => v.lang && v.lang.replace('_', '-').toLowerCase().indexOf('en') === 0);\n  }\n  _voice() {\n    const vs = this._enVoices();\n    if (!vs.length) return null;\n    if (this.state.voiceURI) {\n      const picked = vs.find(v => v.voiceURI === this.state.voiceURI);\n      if (picked) return picked;\n    }\n    const uk = vs.find(v => /google uk english male/i.test(v.name));\n    if (uk) return uk;\n    const want = (this.props.voiceLang ?? 'en-GB').toLowerCase();\n    // score: natural/neural/premium voices first, then Google, then matching lang\n    const score = v => {\n      const n = (v.name + ' ' + v.voiceURI).toLowerCase();\n      let s = 0;\n      if (/natural|neural|premium|enhanced|online/.test(n)) s += 100;\n      if (n.indexOf('google') >= 0) s += 50;\n      if (/siri|samantha|daniel|karen|moira/.test(n)) s += 30;\n      if (v.lang.replace('_', '-').toLowerCase() === want) s += 10;\n      if (!v.localService) s += 5;\n      return s;\n    };\n    return vs.slice().sort((a, b) => score(b) - score(a))[0];\n  }\n\n  speak(p, s) {\n    if (!('speechSynthesis' in window)) return;\n    this._stop();\n    const tk = this._token;\n    const sn = SCRIPT[p].sentences[s];\n    const words = sn.en.split(/\\s+/);\n    const offs = []; let ci = 0;\n    for (const w of words) { const i = sn.en.indexOf(w, ci); offs.push(i); ci = i + w.length; }\n    this.setState({ part: p, sent: s, word: -1, playing: true, pop: null });\n    const u = new SpeechSynthesisUtterance(sn.en);\n    u.lang = this.props.voiceLang ?? 'en-GB';\n    u.rate = this.state.rate;\n    const v = this._voice(); if (v) u.voice = v;\n    let sawBoundary = false;\n    u.onboundary = (e) => {\n      if (tk !== this._token) return;\n      if (e.name && e.name !== 'word') return;\n      sawBoundary = true; clearTimeout(this._fbT); clearTimeout(this._wT);\n      let wi = 0;\n      for (let i = 0; i < offs.length; i++) if (e.charIndex >= offs[i]) wi = i;\n      this.setState({ word: wi });\n    };\n    u.onstart = () => {\n      if (tk !== this._token) return;\n      // fallback: proportional timer if onboundary never fires\n      this._fbT = setTimeout(() => {\n        if (tk !== this._token || sawBoundary) return;\n        let wi = 0;\n        const tick = () => {\n          if (tk !== this._token || sawBoundary || wi >= words.length) return;\n          this.setState({ word: wi });\n          const d = (140 + words[wi].length * 62) / this.state.rate;\n          wi++;\n          this._wT = setTimeout(tick, d);\n        };\n        tick();\n      }, 350);\n    };\n    u.onend = () => {\n      if (tk !== this._token) return;\n      clearTimeout(this._fbT); clearTimeout(this._wT);\n      this._advance(words.length);\n    };\n    this._utt = u; // keep a reference so Chrome doesn't GC the utterance\n    speechSynthesis.speak(u);\n  }\n\n  _advance(nWords) {\n    const st = this.state;\n    if (st.loop) return this.speak(st.part, st.sent);\n    const auto = this.props.autoAdvance ?? true;\n    const part = SCRIPT[st.part];\n    if (auto && st.sent + 1 < part.sentences.length) return this.speak(st.part, st.sent + 1);\n    if (auto && st.playAll && st.part + 1 < SCRIPT.length) return this.speak(st.part + 1, 0);\n    this.setState({ playing: false, word: nWords });\n  }\n\n  goPart(p) {\n    if (p < 0 || p >= SCRIPT.length) return;\n    const wasPlaying = this.state.playing;\n    this._stop();\n    if (wasPlaying) { this.setState({ playAll: false, reads: 0 }); this.speak(p, 0); }\n    else this.setState({ playAll: false, part: p, sent: 0, word: -1, playing: false, pop: null, reads: 0 });\n  }\n\n  _wordPron(sn, wi) {\n    const clean = t => t.replace(/[.,;:?¿!¡\"']/g, '');\n    const ws = sn.en.split(/\\s+/), ps = sn.pron.split(/\\s+/);\n    if (ws.length === ps.length) return clean(ps[wi]);\n    const a = Math.floor(wi * ps.length / ws.length);\n    const b = Math.max(a + 1, Math.floor((wi + 1) * ps.length / ws.length));\n    return ps.slice(a, b).map(clean).join(' ');\n  }\n  _speakWord(s, wi) {\n    const p = this.state.part;\n    const sn = SCRIPT[p].sentences[s];\n    const word = sn.en.split(/\\s+/)[wi].replace(/[.,;:?¿!¡\"']/g, '');\n    this._stop();\n    this.setState({ playing: false, sent: s, word: -1, pop: { s, w: wi } });\n    if (!('speechSynthesis' in window) || !word) return;\n    const u = new SpeechSynthesisUtterance(word);\n    u.lang = this.props.voiceLang ?? 'en-GB';\n    u.rate = Math.min(this.state.rate, 0.85);\n    const v = this._voice(); if (v) u.voice = v;\n    this._utt = u;\n    speechSynthesis.speak(u);\n  }\n  _seekSent(d) {\n    let { part, sent, playing } = this.state;\n    sent += d;\n    if (sent < 0) { if (part > 0) { part--; sent = SCRIPT[part].sentences.length - 1; } else sent = 0; }\n    else if (sent >= SCRIPT[part].sentences.length) {\n      if (part + 1 < SCRIPT.length) { part++; sent = 0; } else sent = SCRIPT[part].sentences.length - 1;\n    }\n    if (playing) this.speak(part, sent);\n    else { this._stop(); this.setState({ part, sent, word: -1, playing: false }); }\n  }\n\n  renderVals() {\n    const st = this.state;\n    const part = SCRIPT[st.part];\n    const tabs = SCRIPT.map((pt, i) => {\n      const on = i === st.part;\n      return {\n        label: pt.label,\n        bg: on ? ORANGE : 'rgba(255,255,255,0.10)', fg: on ? '#FFFFFF' : '#DFF3F6', bd: on ? ORANGE : 'rgba(255,255,255,0.30)',\n        go: () => this.goPart(i)\n      };\n    });\n    let sentences = part.sentences.map((sn, i) => {\n      const active = i === st.sent, done = i < st.sent;\n      const words = sn.en.split(/\\s+/).map((t, wi) => {\n        let bg = 'transparent', fg = INK;\n        if (done) fg = GREEN;\n        else if (active) {\n          if (st.word >= 0 && wi < st.word) fg = GREEN;\n          else if (wi === st.word) { bg = HILITE; fg = '#08333B'; }\n          else if (st.word >= sn.en.length) fg = GREEN;\n        }\n        if (st.pop && st.pop.s === i && st.pop.w === wi) { bg = HILITE; fg = '#08333B'; }\n        return { t, bg, fg, click: (e) => { e.stopPropagation(); this._speakWord(i, wi); } };\n      });\n      const hasPop = !!(st.pop && st.pop.s === i);\n      const popWord = hasPop ? sn.en.split(/\\s+/)[st.pop.w].replace(/[.,;:?¿!¡\"']/g, '') : '';\n      const popPron = hasPop ? this._wordPron(sn, st.pop.w) : '';\n      return {\n        words, pron: sn.pron, es: sn.es, hasPop, popWord, popPron,\n        popPlay: (e) => { e.stopPropagation(); this._speakWord(i, st.pop.w); },\n        popClose: (e) => { e.stopPropagation(); this.setState({ pop: null }); },\n        bg: active ? '#FFFFFF' : 'transparent',\n        border: active ? '3px solid #17A8C4' : '2px solid rgba(20,54,68,0.10)',\n        shadow: active ? '0 10px 30px rgba(23,168,196,0.32)' : 'none',\n        op: active ? '1' : '0.32',\n        scale: active ? '1' : '0.97',\n        size: active ? '30px' : '20px',\n        pad: active ? '18px 20px' : '10px 16px',\n        play: () => { this.setState({ playAll: false }); this.speak(st.part, i); }\n      };\n    });\n    if (st.fluid) {\n      const words = [];\n      part.sentences.forEach((sn, i) => {\n        const done = i < st.sent, active = i === st.sent;\n        sn.en.split(/\\s+/).forEach((t, wi) => {\n          let bg = 'transparent', fg = INK;\n          if (done) fg = GREEN;\n          else if (active) {\n            if (st.word >= 0 && wi < st.word) fg = GREEN;\n            else if (wi === st.word) { bg = HILITE; fg = '#08333B'; }\n            else if (st.word >= sn.en.length) fg = GREEN;\n          }\n          if (st.pop && st.pop.s === i && st.pop.w === wi) { bg = HILITE; fg = '#08333B'; }\n          words.push({ t, bg, fg, click: (e) => { e.stopPropagation(); this._speakWord(i, wi); } });\n        });\n      });\n      const hasPop = !!st.pop;\n      const popWord = hasPop ? part.sentences[st.pop.s].en.split(/\\s+/)[st.pop.w].replace(/[.,;:?¿!¡\"']/g, '') : '';\n      const popPron = hasPop ? this._wordPron(part.sentences[st.pop.s], st.pop.w) : '';\n      sentences = [{\n        words, hasPop, popWord, popPron,\n        pron: part.sentences.map(x => x.pron).join(' '),\n        es: part.sentences.map(x => x.es).join(' '),\n        popPlay: (e) => { e.stopPropagation(); this._speakWord(st.pop.s, st.pop.w); },\n        popClose: (e) => { e.stopPropagation(); this.setState({ pop: null }); },\n        bg: '#FFFFFF', border: '3px solid #17A8C4', shadow: '0 10px 30px rgba(23,168,196,0.20)',\n        op: '1', scale: '1', size: '28px', pad: '18px 20px',\n        play: () => { this.setState({ playAll: false }); this.speak(st.part, 0); }\n      }];\n    }\n    const rates = [0.5, 0.75, 1].map(r => ({\n      label: r + '×',\n      bg: st.rate === r ? '#17A8C4' : '#1A5D6E', fg: st.rate === r ? '#FFFFFF' : '#F2ECFA',\n      set: () => this.setState({ rate: r }, () => { if (this.state.playing) this.speak(this.state.part, this.state.sent); })\n    }));\n    return {\n      tabs, sentences, rates,\n      micState: st.micState || 'idle',\n      micIdle: (st.micState || 'idle') === 'idle',\n      micOk: st.micState === 'ok',\n      micDenied: st.micState === 'denied',\n      askMic: () => {\n        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {\n          this.setState({ micState: 'denied' }); return;\n        }\n        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {\n          stream.getTracks().forEach(t => t.stop());\n          this.setState({ micState: 'ok', micBlocked: false });\n        }).catch(() => this.setState({ micState: 'denied', micBlocked: true }));\n      },\n      testMode: st.testMode, notTest: !st.testMode,\n      enterTest: () => { this._stop(); this.setState({ testMode: true, playing: false }); },\n      exitTest: () => this._exitTest(),\n      testTime: this._fmt(st.testMs),\n      testRunning: st.testRunning,\n      testToggle: () => st.testRunning ? this._endTest() : this._startTest(),\n      testBtnLabel: st.testRunning ? '⏹ Terminar y guardar' : (st.attempts.length ? '🔁 Repetir test' : '▶ Iniciar test'),\n      testBtnBg: st.testRunning ? '#C0442E' : '#17A8C4',\n      recLabel: st.testRunning\n        ? (st.recording ? '● Grabando tu voz' : (st.micBlocked ? '🚫 Micrófono bloqueado: toca el candado 🔒 junto a la dirección → Micrófono → Permitir, y recarga' : 'Activando micrófono…'))\n        : 'El micrófono se activa al iniciar',\n      recColor: st.recording && st.testRunning ? '#C0442E' : '#5E8290',\n      attempts: st.attempts.map((a, idx) => ({\n        n: a.n, time: this._fmt(a.ms), hasAudio: !!a.url, noAudio: !a.url,\n        tag: idx === 0 ? '🌱 Primera' : (idx === st.attempts.length - 1 ? '⭐ Última' : (a.date || '')),\n        playing: st.playingAtt === idx,\n        playLabel: st.playingAtt === idx ? '⏹ Detener' : '▶ Escuchar',\n        playBg: st.playingAtt === idx ? '#C0442E' : '#17A8C4',\n        playRec: (e) => { e.stopPropagation(); this._playAttempt(idx); },\n        del: (e) => { e.stopPropagation(); this._deleteAttempt(idx); }\n      })).reverse(),\n      hasAttempts: st.attempts.length > 0,\n      allParts: SCRIPT.map(pt => ({ label: pt.label, title: pt.title, text: pt.sentences.map(x => x.en).join(' ') })),\n      reads: st.reads,\n      countRead: () => this._countRead(),\n      readScale: st.pulse ? '1.18' : '1',\n      progPct: (() => {\n        let totalW = 0, doneW = 0;\n        SCRIPT.forEach((pt, pi) => {\n          pt.sentences.forEach((x, i) => {\n            const n = x.en.split(/\\s+/).length;\n            totalW += n;\n            if (pi < st.part) doneW += n;\n            else if (pi === st.part) {\n              if (i < st.sent) doneW += n;\n              else if (i === st.sent && st.word >= 0) doneW += Math.min(st.word + 1, n);\n            }\n          });\n        });\n        this._pct = Math.round(100 * doneW / totalW);\n        return this._pct + '%';\n      })(),\n      mascotLeft: 'clamp(0px, calc(' + (this._pct || 0) + '% - 16px), calc(100% - 32px))',\n      progMsg: (() => {\n        const p = this._pct || 0;\n        const msg = p === 0 ? 'Lista para brillar ✨' : p < 35 ? '¡Buen comienzo! 💪' : p < 70 ? '¡Vas muy bien! 🔥' : p < 100 ? '¡Ya casi! 🚀' : '¡Guion completo! 🎉';\n        return p + '% · ' + msg;\n      })(),\n      toggleFluid: () => this.setState({ fluid: !st.fluid }),\n      fluidLabel: st.fluid ? '📄 Vista fluida' : '🧩 Por frases',\n      fluidBg: st.fluid ? '#17A8C4' : '#FFFFFF',\n      fluidFg: st.fluid ? '#FFFFFF' : '#143644',\n      partLabel: part.label, partTitle: part.title,\n      status: 'Frase ' + (st.sent + 1) + ' de ' + part.sentences.length + (st.playAll ? ' · reproduciendo todo el guion' : ''),\n      playLabel: st.playing ? '⏸ Pausar' : '▶ Reproducir',\n      togglePlay: () => {\n        if (st.playing) { this._stop(); this.setState({ playing: false }); }\n        else this.speak(st.part, st.sent);\n      },\n      playAllGo: () => { this._stop(); this.setState({ playAll: true }); this.speak(0, 0); },\n      allBg: st.playAll && st.playing ? ORANGE : 'rgba(255,255,255,0.10)',\n      allFg: st.playAll && st.playing ? '#FFFFFF' : '#CFF0F5',\n      prevSent: () => this._seekSent(-1),\n      nextSent: () => this._seekSent(1),\n      prevPart: () => this.goPart(st.part - 1),\n      nextPart: () => this.goPart(st.part + 1),\n      toggleLoop: () => this.setState({ loop: !st.loop }),\n      loopBg: st.loop ? HILITE : '#1A5D6E',\n      loopBd: st.loop ? '#2FB9CE' : 'rgba(255,255,255,0.16)',\n      pronDisp: st.showPron ? 'block' : 'none',\n      esDisp: st.showEs ? 'block' : 'none',\n      togglePron: () => this.setState({ showPron: !st.showPron }),\n      toggleEs: () => this.setState({ showEs: !st.showEs }),\n      pronLabel: st.showPron ? 'Pronunciación: sí' : 'Pronunciación: no',\n      esLabel: st.showEs ? 'Traducción: sí' : 'Traducción: no',\n      pronBg: st.showPron ? 'rgba(23,168,196,0.22)' : '#1A5D6E', pronFg: st.showPron ? '#EFFBFD' : '#A9D4DC',\n      esBg: st.showEs ? 'rgba(23,168,196,0.22)' : '#1A5D6E', esFg: st.showEs ? '#EFFBFD' : '#A9D4DC',\n      voiceOptions: (() => {\n        const cur = this._voice();\n        return this._enVoices().map(v => ({\n          name: v.name + ' (' + v.lang + ')',\n          uri: v.voiceURI,\n          selected: cur && cur.voiceURI === v.voiceURI\n        }));\n      })(),\n      voiceValue: (this._voice() || {}).voiceURI || '',\n      onVoiceChange: (e) => this.setState({ voiceURI: e.target.value }, () => {\n        if (this.state.playing) this.speak(this.state.part, this.state.sent);\n      })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
